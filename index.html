<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>팜스타트(Pharmstart)</title>
    <style>
        /* 긴 이미지를 위한 깔끔한 스타일 */
        body { margin: 0; padding: 0; text-align: center; background-color: #ffffff; }
        .container { max-width: 100%; margin: 0 auto; line-height: 0; }
        img { width: 100%; max-width: 800px; height: auto; display: block; margin: 0 auto; }
        
        /* 신청 폼 영역 */
        .form-section { padding: 80px 20px; background: #f4f4f4; line-height: normal; }
        iframe { max-width: 800px; width: 100%; min-height: 1000px; border: none; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <div class="container">
        <img src="main_01.png" alt="팜스타트 소개 01">
        <img src="main_02.png" alt="팜스타트 소개 02">
        
        <div class="form-section">
            <h2>팜스타트 서비스 신청하기</h2>
            <p>6개월 패키지 할인 혜택을 놓치지 마세요!</p>
<div class="form-section">
    <div class="form-card">
        <h2>팜스타트 서비스 신청</h2>
        <p class="benefit-tag">🎁 6개월 패키지 신청 시 20만원 할인 혜택!</p>
        
        <form action="https://formspree.io/f/mvzvyqqb" method="POST">
            <div class="input-group">
                <label>성함</label>
                <input type="text" name="name" placeholder="성함을 입력해주세요" required>
            </div>
            <div class="input-group">
                <label>연락처</label>
                <input type="tel" name="phone" placeholder="010-0000-0000" required>
            </div>
            <div class="input-group">
                <label>문의 사항</label>
                <textarea name="message" placeholder="궁금하신 내용을 적어주세요"></textarea>
            </div>
            <button type="submit">지금 바로 신청하기</button>
        </form>
    </div>
</div>

<style>
    .form-section { padding: 80px 20px; background: #f8fbfb; } /* 연한 민트빛 배경 */
    .form-card { 
        max-width: 500px; margin: 0 auto; background: white; 
        padding: 40px; border-radius: 20px; 
        box-shadow: 0 10px 30px rgba(0,0,0,0.05); 
    }
    .benefit-tag { color: #00bfa5; font-weight: bold; margin-bottom: 30px; }
    .input-group { text-align: left; margin-bottom: 20px; }
    .input-group label { display: block; font-size: 14px; margin-bottom: 8px; color: #555; }
    input, textarea { 
        width: 100%; padding: 12px; border: 1px solid #ddd; 
        border-radius: 8px; box-sizing: border-box; font-size: 16px;
    }
    textarea { height: 100px; resize: none; }
    button { 
        width: 100%; padding: 15px; background: #00bfa5; color: white; 
        border: none; border-radius: 8px; font-size: 18px; font-weight: bold; 
        cursor: pointer; transition: 0.3s;
    }
    button:hover { background: #008e7a; }
</style>
        </div>
    </div>

</body>
</html>
